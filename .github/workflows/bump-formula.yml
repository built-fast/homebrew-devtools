# gh workflow run bump-formula.yml \
#   -f version=v0.0.1 \
#   -f formula=lcars \
#   -f type=bash \
#   -R built-fast/homebrew-devtools
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
        type: string
      formula:
        description: 'Formula name'
        required: true
        type: string
      type:
        description: 'Formula type'
        required: true
        type: choice
        options:
          - go
          - rust
          - bash

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Update formula
        env:
          FORMULA: ${{ github.event.inputs.formula }}
          VERSION: ${{ github.event.inputs.version }}
          TYPE: ${{ github.event.inputs.type }}
        run: |
          mkdir -p Formula
          ./.github/script/update-formula

          git config --global user.name 'Josh Priddle'
          git config --global user.email 'jpriddle@me.com'
          git add "Formula/${FORMULA}.rb"
          git commit -m "Updated ${FORMULA} to ${VERSION}"
          git push origin main
